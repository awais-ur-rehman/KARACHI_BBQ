services:
  db:
    image: postgres:16-alpine
    container_name: kbbq_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: ${TZ}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: kbbq_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${PORT}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      PRINT_MODE: ${PRINT_MODE}
      PRINTER_IP: ${PRINTER_IP}
      PRINTER_PORT: ${PRINTER_PORT}
      PRINT_AGENT_URL: ${PRINT_AGENT_URL}
      DEFAULT_LANGUAGE: ${DEFAULT_LANGUAGE}
      DEFAULT_CURRENCY: ${DEFAULT_CURRENCY}
      TZ: ${TZ}
    volumes:
      - uploads:/app/uploads
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    container_name: kbbq_nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
      frontend_builder:
        condition: service_completed_successfully
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
      - uploads:/usr/share/nginx/html/uploads:ro

  frontend_builder:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: kbbq_frontend_builder
    volumes:
      - frontend_dist:/output
    # Builder writes to /output then exits. nginx serves the result.
    restart: "no"

  backup:
    image: postgres:16-alpine
    container_name: kbbq_backup
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      BACKUP_DIR: ${BACKUP_DIR}
      TZ: ${TZ}
    volumes:
      - backups:${BACKUP_DIR}
      - ./backup/backup.sh:/backup.sh:ro
    entrypoint: ["/bin/sh", "-c", "chmod +x /backup.sh && tail -f /dev/null"]
    # Phase 0: idle. Phase 7 wires cron / scheduled invocation.

volumes:
  pgdata:
  backups:
  uploads:
  frontend_dist:
