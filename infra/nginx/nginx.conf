user  nginx;
worker_processes  auto;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;
    client_max_body_size 10m;

    # gzip for static assets
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # Reverse-proxy the API to the backend container — single origin,
        # cookies pass through cleanly.
        location /api/ {
            proxy_pass http://backend:3000/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass_request_headers on;
            proxy_read_timeout 60s;
        }

        # Uploaded assets (restaurant logo, etc.) — served from a separate
        # volume mount; cannot live under the read-only frontend_dist root.
        location /uploads/ {
            alias /var/www/uploads/;
            expires 7d;
            add_header Cache-Control "public";
        }

        # SPA fallback — every non-asset URL serves index.html so React
        # Router handles client-side routing.
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
